version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: ad-campaign-dashboard-dev
    ports:
      - "5173:5173"  # Vite dev server (frontend)
      - "3001:3001"  # API server (backend)
      - "3000:3000"  # Frontend preview
    volumes:
      - .:/app
      - /app/node_modules  # Prevent node_modules from being overwritten
    environment:
      - NODE_ENV=development
    command: pnpm run dev
    working_dir: /app

  backend:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: ad-campaign-api-server
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: pnpm -F @workspace/api-server run dev
    working_dir: /app

  frontend:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: ad-campaign-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: pnpm -F @workspace/ad-campaign-dashboard run dev
    working_dir: /app
